  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    /* Nav */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0) 100%);
    }

    .logo {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .logo:hover { color: #fff; }

    nav {
      display: flex;
      gap: 2rem;
    }

    nav a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    nav a:hover, nav a.active { color: rgba(255,255,255,0.9); }

    /* Page title */
    .page-title {
      padding: 8rem 3rem 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* Masonry grid */
    .gallery {
      columns: 3;
      column-gap: 6px;
      padding: 0 6px 6px;
    }

    @media (max-width: 900px) { .gallery { columns: 2; } }
    @media (max-width: 500px) { .gallery { columns: 1; } }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 6px;
      cursor: pointer;
      overflow: hidden;
      display: block;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease, opacity 0.3s ease;
      opacity: 0.85;
    }

    .gallery-item:hover img {
      transform: scale(1.03);
      opacity: 1;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.95);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      cursor: default;
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 1001;
    }
    .lightbox-close:hover { color: #fff; }

    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: color 0.3s ease;
      z-index: 1001;
      padding: 1rem;
    }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }
    .lightbox-prev:hover,
    .lightbox-next:hover { color: #fff; }

    .lightbox-counter {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25);
    }

    /* Footer */
    footer {
      padding: 3rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lb-close">Close</span>
    <span class="lightbox-prev" id="lb-prev">← Prev</span>
    <img id="lb-img" src="" alt="" />
    <span class="lightbox-next" id="lb-next">Next →</span>
    <span class="lightbox-counter" id="lb-counter"></span>
  </div>

  <script>
    const items = Array.from(document.querySelectorAll('.gallery-item img'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let current = 0;

    function openLightbox(index) {
      current = index;
      lbImg.src = items[current].src;
      lbCounter.textContent = (current + 1) + ' / ' + items.length;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function navigate(dir) {
      current = (current + dir + items.length) % items.length;
      lbImg.src = items[current].src;
      lbCounter.textContent = (current + 1) + ' / ' + items.length;
    }

    items.forEach((img, i) => {
      img.parentElement.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); navigate(-1); });
    document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); navigate(1); });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
